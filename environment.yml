name: mom6-tools
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - sphinx
  - sphinx_rtd_theme
  - nbsphinx
  - ipython
  - jinja2
  - numpy
  - numba
  - pyyaml
  - xarray
  - dask
  - pytest
  - netCDF4
  - matplotlib
  - cftime
  - scipy
  - jupyter
  - cmocean
  - cartopy
  - distributed
  - PyYAML
  - intake
  - nc-time-axis
  - intake-xarray
  - setuptools=68.0.0
  - pip
  - pip:
    - setuptools-scm
    - vcs-versioning
    - ncar-jobqueue @ git+https://github.com/NCAR/ncar-jobqueue
    - momlevel @ git+https://github.com/jkrasting/momlevel
    - xwavelet @ git+https://github.com/jkrasting/xwavelet
    - -e .
